<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- keeping title simple -->
<title>Lumi — Study Assistant</title>

<!-- fonts I liked after trying a few -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>

<style>
  /* basic reset - easier than fixing margin bugs later */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* theme colors - changed multiple times while testing */
  :root {
    --bg: #0d0f14;
    --surface: #13161f;
    --panel: #1a1e2a;
    --border: #252a38;
    --accent: #5b8cff;
    --accent2: #a78bfa;
    --user-bg: #1e2847;
    --bot-bg: #171c28;
    --text: #e8eaf0;
    --muted: #6b7394;
    --success: #34d399;
    --font-body: 'Sora', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* subtle grid background — not required but looks nice */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,140,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,140,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .shell {
    width: min(700px, 96vw);
    height: min(820px, 95vh);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.6);
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    position: relative;
  }

  /* online indicator - fake but useful UX */
  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--success);
    border: 2px solid var(--panel);
  }

  .hinfo h1 {
    font-size: 15px;
    font-weight: 600;
  }

  .hinfo p {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* subject selector */
  .sub-wrap { position: relative; }

  .subject-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(91,140,255,.12);
    border: 1px solid rgba(91,140,255,.25);
    color: var(--accent);
    cursor: pointer;
  }

  .sub-drop {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 160px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
  }

  .sub-drop.open { display: block; }

  .sub-drop label {
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    cursor: pointer;
    font-size: 12px;
  }

  /* ---------- messages ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  /* bubbles */
  .bubble-row {
    display: flex;
    gap: 10px;
  }

  .bubble-row.user { flex-direction: row-reverse; }

  .bub-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
  }

  .bubble-row.user .bubble {
    background: var(--user-bg);
    border-top-right-radius: 4px;
  }

  .bubble-row.bot .bubble {
    background: var(--bot-bg);
    border-top-left-radius: 4px;
  }

  .ts {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  /* ---------- input ---------- */
  footer {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 10px 14px;
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    resize: none;
    max-height: 120px;
  }

  button {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="shell">

  <header>
    <div class="avatar">🤖</div>
    <div class="hinfo">
      <h1>Lumi</h1>
      <p>pdf · rag · study assistant</p>
    </div>

    <div class="sub-wrap">
      <div class="subject-badge" id="subBadge">
        📚 Subject <strong id="subLabel">1</strong>
      </div>

      <div class="sub-drop" id="subDrop">
        <label><input type="radio" name="sub" value="1" checked> Subject 1</label>
        <label><input type="radio" name="sub" value="2"> Subject 2</label>
        <label><input type="radio" name="sub" value="3"> Subject 3</label>
        <label><input type="radio" name="sub" value="4"> Subject 4</label>
      </div>
    </div>
  </header>

  <div class="messages" id="msgs">
    <div class="welcome" id="welcomeMsg">
      <h2>Hey, I'm Lumi 👋</h2>
      <p>Ask questions from your PDFs and notes. I'll try to explain clearly.</p>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="msgInput" placeholder="Ask something..."></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </footer>

</div>

<script>
  // API endpoint - local for now
  const API = "http://127.0.0.1:8000/Genai/api/chat/";

  // read access token from URL — passed by student.html when opening this page
  const urlParams = new URLSearchParams(window.location.search);
  const ACCESS_TOKEN = urlParams.get("token") || "";

  let activeSubId = "1";
  let isSendingMsg = false;

  const msgs = document.getElementById("msgs");
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  // subject dropdown toggle
  document.getElementById("subBadge").onclick = () => {
    document.getElementById("subDrop").classList.toggle("open");
  };

  // handle subject change
  document.querySelectorAll("input[name=sub]").forEach(r => {
    r.onchange = () => {
      activeSubId = r.value;
      document.getElementById("subLabel").textContent = r.value;
      console.log("Selected subject:", activeSubId);
    };
  });

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(text, who) {
    document.getElementById("welcomeMsg")?.remove();

    const row = document.createElement("div");
    row.className = `bubble-row ${who}`;

    row.innerHTML = `
      <div class="bub-avatar">${who === "user" ? "🧑" : "🤖"}</div>
      <div>
        <div class="bubble">${text}</div>
        <div class="ts">${timeNow()}</div>
      </div>
    `;

    msgs.appendChild(row);

    // sometimes scroll didn't work immediately
    setTimeout(() => {
      msgs.scrollTop = msgs.scrollHeight;
    }, 50);
  }

  async function sendMsg() {
    if (isSendingMsg) return;

    const q = input.value.trim();
    if (!q) return;

    isSendingMsg = true;
    sendBtn.disabled = true;
    input.value = "";

    addMessage(q, "user");
    addMessage("Typing...", "bot");

    console.log("Sending question:", q);

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${ACCESS_TOKEN}`   // <-- token added here
        },
        body: JSON.stringify({
          subject_id: activeSubId,
          question: q
        })
      });

      msgs.lastChild.remove();
      const data = await res.json();

      console.log("Raw response:", data);

      let answer =
        data?.answer?.choices?.[0]?.message?.content ||
        data?.answer ||
        "No answer found.";

      addMessage(answer, "bot");

    } catch (e) {
      msgs.lastChild.remove();
      addMessage("Server error. Check backend.", "bot");
    }

    isSendingMsg = false;
    sendBtn.disabled = false;
    input.focus(); // probably not needed but keeping it
  }

  sendBtn.onclick = sendMsg;

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });

  // TODO: add markdown rendering
  // TODO: replace typing text with animated dots
</script>

</body>
</html>
