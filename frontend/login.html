<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color:#fff;
        }
        .login-container {
            width:100%; max-width:420px; padding:20px;
        }
        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align:center; margin-bottom:32px;
        }
        .logo h1 {
            font-size:28px; font-weight:700;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .logo p { color:rgba(255,255,255,0.5); font-size:14px; margin-top:4px; }
        .form-group {
            margin-bottom:20px;
        }
        .form-group label {
            display:block; font-size:13px; font-weight:500;
            color:rgba(255,255,255,0.7); margin-bottom:6px;
        }
        .form-group input {
            width:100%; padding:14px 16px;
            background: rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:12px; color:#fff; font-size:15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline:none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.3); }
        .btn-login {
            width:100%; padding:14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border:none; border-radius:12px;
            color:#fff; font-size:16px; font-weight:600;
            cursor:pointer; transition: all 0.3s;
            margin-top:8px;
        }
        .btn-login:hover { transform:translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
        .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .error-msg {
            background: rgba(255,71,87,0.15);
            border:1px solid rgba(255,71,87,0.3);
            color:#ff6b81; padding:10px 14px;
            border-radius:10px; font-size:13px;
            margin-bottom:16px; display:none;
        }
        .register-link {
            text-align:center; margin-top:24px;
            font-size: 14px; color: rgba(255,255,255,0.5);
        }
        .register-link a {
            color:#667eea; text-decoration:none; font-weight:500;
        }
        .register-link a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>🎓 EduHub</h1>
                <p>Smart College Management System</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API_BASE}/api/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Invalid credentials');
                }

                // Store auth data
                localStorage.setItem('access_token', data.tokens.access);
                localStorage.setItem('refresh_token', data.tokens.refresh);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect based on role
                const role = data.user.role;
                if (role === 'faculty' || role === 'admin') {
                    window.location.href = 'teacher.html';
                } else {
                    window.location.href = 'student.html';
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('access_token')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.role === 'faculty' || user.role === 'admin') {
                window.location.href = 'teacher.html';
            } else if (user.role === 'student') {
                window.location.href = 'student.html';
            }
        }
    </script>
</body>
</html>
