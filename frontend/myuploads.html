<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Uploads — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background: #0f0c29; color:#fff;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px; height: 100vh; position: fixed;
            background: rgba(15,12,41,0.9); border-right: 1px solid rgba(255,255,255,0.05);
            padding: 24px 0; display:flex; flex-direction:column;
            backdrop-filter: blur(20px);
        }
        .logo {
            font-size: 20px; font-weight: 700; padding: 0 24px 32px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-items { flex:1; }
        .nav-item {
            padding: 16px 24px; color: rgba(255,255,255,0.6);
            display: flex; align-items:center; gap: 12px;
            text-decoration:none; transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #fff; background: rgba(102,126,234,0.1);
            border-right: 3px solid #667eea;
        }
        .user-profile {
            padding: 24px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items:center; gap:12px;
        }
        .avatar {
            width:40px; height:40px; border-radius:50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex; align-items:center; justify-content:center;
            font-weight:600;
        }
        .user-info h4 { font-size:14px; }
        .user-info p { font-size:12px; color:rgba(255,255,255,0.5); }
        .logout-btn { color:#ff6b81; cursor:pointer; background:none; border:none; margin-left:auto; }

        /* Main Content */
        .main-content {
            margin-left: 250px; padding: 32px 48px;
        }
        .header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;
        }
        .header h1 { font-size: 28px; font-weight: 700; }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; overflow: hidden;
        }
        table { width:100%; border-collapse: collapse; }
        th, td { padding: 16px 24px; text-align:left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-weight:500; color:rgba(255,255,255,0.5); font-size:13px; text-transform:uppercase; letter-spacing:1px; background: rgba(0,0,0,0.2); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size:12px; font-weight:600;
            display: inline-block;
        }
        .status-approved { background: rgba(46,213,115,0.1); color: #2ed573; }
        .status-pending { background: rgba(255,165,2,0.1); color: #ffa502; }
        .status-rejected { background: rgba(255,71,87,0.1); color: #ff6b81; }

        .btn-action { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; transition:color 0.2s; margin-left:12px; }
        .btn-action:hover { color:#ff6b81; }
        .loader { padding: 40px; text-align:center; color:rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎓 EduHub</div>
        <div class="nav-items">
            <a href="teacher.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="myuploads.html" class="nav-item active"><i class="fas fa-folder"></i> My Uploads</a>
            <a href="notices.html" class="nav-item"><i class="fas fa-bullhorn"></i> Notices</a>
        </div>
        <div class="user-profile">
            <div class="avatar" id="userAvatar">T</div>
            <div class="user-info">
                <h4 id="userName">Loading...</h4>
                <p>Faculty</p>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1>My Uploads</h1>
                <p style="color:rgba(255,255,255,0.5); margin-top:4px;">Manage and monitor all resources you've shared.</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || (user.role !== 'faculty' && user.role !== 'admin')) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function fetchUploads() {
            const tbody = document.getElementById('tableBody');
            try {
                // Fetch using the generic resource endpoint (filtered by current faculty in backend)
                const res = await fetch(`${API_BASE}/resource/api/resources/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) return logout();
                const data = await res.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:rgba(255,255,255,0.5);">No uploads found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td style="font-weight:500;">
                            <i class="fas fa-file-alt" style="color:#667eea; margin-right:8px;"></i>
                            ${r.title}
                        </td>
                        <td style="color:rgba(255,255,255,0.7);">${r.subject ? r.subject.sub_code : '-'}</td>
                        <td><span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span></td>
                        <td>${r.view_count}</td>
                        <td style="color:rgba(255,255,255,0.5);">${new Date(r.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-action" onclick="deleteUpload(${r.id})" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ff6b81;">Failed to load data.</td></tr>';
            }
        }

        async function deleteUpload(id) {
            if (!confirm('Are you sure you want to delete this resource?')) return;
            try {
                const res = await fetch(`${API_BASE}/resource/api/resources/${id}/`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchUploads();
                } else {
                    alert('Delete failed.');
                }
            } catch(e) {
                console.error(e);
            }
        }

        fetchUploads();
    </script>
</body>
</html>
