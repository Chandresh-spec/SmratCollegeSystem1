<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Uploads — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background: #0f0c29; color:#fff;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px; height: 100vh; position: fixed;
            background: rgba(15,12,41,0.9); border-right: 1px solid rgba(255,255,255,0.05);
            padding: 24px 0; display:flex; flex-direction:column;
            backdrop-filter: blur(20px);
        }
        .logo {
            font-size: 20px; font-weight: 700; padding: 0 24px 32px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-items { flex:1; }
        .nav-item {
            padding: 16px 24px; color: rgba(255,255,255,0.6);
            display: flex; align-items:center; gap: 12px;
            text-decoration:none; transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #fff; background: rgba(102,126,234,0.1);
            border-right: 3px solid #667eea;
        }
        .user-profile {
            padding: 24px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items:center; gap:12px;
        }
        .avatar {
            width:40px; height:40px; border-radius:50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex; align-items:center; justify-content:center;
            font-weight:600;
        }
        .user-info h4 { font-size:14px; }
        .user-info p { font-size:12px; color:rgba(255,255,255,0.5); }
        .logout-btn { color:#ff6b81; cursor:pointer; background:none; border:none; margin-left:auto; }

        /* Main Content */
        .main-content {
            margin-left: 250px; padding: 32px 48px;
        }
        .header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;
        }
        .header h1 { font-size: 28px; font-weight: 700; }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; overflow: hidden;
        }
        table { width:100%; border-collapse: collapse; }
        th, td { padding: 16px 24px; text-align:left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-weight:500; color:rgba(255,255,255,0.5); font-size:13px; text-transform:uppercase; letter-spacing:1px; background: rgba(0,0,0,0.2); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size:12px; font-weight:600;
            display: inline-block;
        }
        .status-approved { background: rgba(46,213,115,0.1); color: #2ed573; }
        .status-pending { background: rgba(255,165,2,0.1); color: #ffa502; }
        .status-rejected { background: rgba(255,71,87,0.1); color: #ff6b81; }

        .btn-action { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; transition:color 0.2s; margin-left:12px; }
        .btn-action:hover { color:#ff6b81; }
        .btn-edit:hover { color:#667eea; }
        .loader { padding: 40px; text-align:center; color:rgba(255,255,255,0.5); }
        
        /* Modal & Buttons */
        .btn-upload {
            padding: 12px 24px; border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2); border:none;
            color: #fff; font-weight: 600; cursor:pointer;
            display: flex; align-items:center; gap:8px; transition: transform 0.3s;
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display:none; align-items:center; justify-content:center; z-index:1000;
        }
        .modal {
            background: #1a1a2e; width:100%; max-width:500px;
            border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            padding:32px;
        }
        .modal-header { display:flex; justify-content:space-between; margin-bottom:24px; }
        .close-btn { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:18px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:rgba(255,255,255,0.7); margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; padding:12px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1); border-radius:8px;
            color:#fff; font-family:'Inter';
        }
        .form-group textarea { height:80px; resize:none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎓 EduHub</div>
        <div class="nav-items">
            <a href="teacher.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="myuploads.html" class="nav-item active"><i class="fas fa-folder"></i> My Uploads</a>
            <a href="notices.html" class="nav-item"><i class="fas fa-bullhorn"></i> Notices</a>
        </div>
        <div class="user-profile">
            <div class="avatar" id="userAvatar">T</div>
            <div class="user-info">
                <h4 id="userName">Loading...</h4>
                <p>Faculty</p>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1>My Uploads</h1>
                <p style="color:rgba(255,255,255,0.5); margin-top:4px;">Manage and monitor all resources you've shared.</p>
            </div>
            <button class="btn-upload" onclick="openModal()"><i class="fas fa-plus"></i> Upload Resource</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Upload/Edit Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Upload New Resource</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="uploadForm">
                <input type="hidden" id="editResourceId" value="">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="resTitle" required placeholder="Lecture 1: Introduction">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="resDesc" placeholder="Brief notes about this upload..."></textarea>
                </div>
                <div class="form-group" style="display:flex; gap:12px;">
                    <div style="flex:1;">
                        <label>Subject</label>
                        <select id="resSubject" required>
                            <option value="">Loading subjects...</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label>File Type</label>
                        <select id="resType" required>
                            <option value="PDF">PDF Document</option>
                            <option value="PPT">Presentation</option>
                            <option value="DOC">Word Document</option>
                            <option value="IMG">Image</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>File</label>
                    <input type="file" id="resFile">
                    <small id="fileHelp" style="display:none; color:rgba(255,255,255,0.5); font-size:11px;">Leave blank to keep existing file.</small>
                </div>
                <button type="submit" class="btn-upload" style="width:100%; justify-content:center; margin-top:24px;" id="submitUploadBtn">
                    Upload & Publish
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || (user.role !== 'faculty' && user.role !== 'admin')) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        let subjectsLoaded = false;
        async function loadSubjects() {
            const select = document.getElementById('resSubject');
            if (subjectsLoaded) return;
            try {
                const res = await fetch(`${API_BASE}/academic/api/subjects/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const options = data.map(sub => `<option value="${sub.id}">${sub.sub_code} - ${sub.sub_name}</option>`);
                select.innerHTML = options.length ? options.join('') : '<option disabled>No subjects available</option>';
                subjectsLoaded = true;
            } catch(e) { console.error(e); }
        }

        function openModal() {
            document.getElementById('uploadModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Upload New Resource';
            document.getElementById('submitUploadBtn').innerHTML = 'Upload & Publish';
            document.getElementById('uploadForm').reset();
            document.getElementById('editResourceId').value = '';
            document.getElementById('resFile').required = true;
            document.getElementById('fileHelp').style.display = 'none';
            loadSubjects();
        }

        function closeModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        function openEditModal(id, title, desc, subjectId, type) {
            openModal();
            document.getElementById('modalTitle').textContent = 'Edit Resource';
            document.getElementById('submitUploadBtn').innerHTML = 'Save Changes';
            document.getElementById('editResourceId').value = id;
            document.getElementById('resTitle').value = title;
            document.getElementById('resDesc').value = desc;
            document.getElementById('resType').value = type;
            document.getElementById('resFile').required = false;
            document.getElementById('fileHelp').style.display = 'block';
            setTimeout(() => { document.getElementById('resSubject').value = subjectId; }, 500); // wait for subjects to load
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitUploadBtn');
            btn.disabled = true; btn.textContent = 'Saving...';

            const editId = document.getElementById('editResourceId').value;
            const formData = new FormData();
            formData.append('title', document.getElementById('resTitle').value);
            formData.append('description', document.getElementById('resDesc').value);
            formData.append('subject', document.getElementById('resSubject').value);
            formData.append('file_type', document.getElementById('resType').value);
            
            const fileInput = document.getElementById('resFile');
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            const url = editId ? `${API_BASE}/resource/api/resources/${editId}/` : `${API_BASE}/resource/api/resources/`;
            const method = editId ? 'PATCH' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (res.ok) {
                    closeModal();
                    fetchUploads();
                } else {
                    alert("Operation failed.");
                }
            } catch(e) {
                console.error(e);
                alert("An error occurred.");
            } finally {
                btn.disabled = false; btn.innerHTML = editId ? 'Save Changes' : 'Upload & Publish';
            }
        });

        async function fetchUploads() {
            const tbody = document.getElementById('tableBody');
            try {
                // Fetch using the generic resource endpoint (filtered by current faculty in backend)
                const res = await fetch(`${API_BASE}/resource/api/resources/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) return logout();
                const data = await res.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:rgba(255,255,255,0.5);">No uploads found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td style="font-weight:500;">
                            <i class="fas fa-file-alt" style="color:#667eea; margin-right:8px;"></i>
                            ${r.title}
                        </td>
                        <td style="color:rgba(255,255,255,0.7);">${r.subject ? r.subject.sub_code : '-'}</td>
                        <td><span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span></td>
                        <td>${r.view_count}</td>
                        <td style="color:rgba(255,255,255,0.5);">${new Date(r.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-action btn-edit" onclick="openEditModal(${r.id}, '${r.title.replace(/'/g, "\\'")}', '${r.description ? r.description.replace(/'/g, "\\'") : ''}', ${r.subject ? r.subject.id : "''"}, '${r.file_type}')" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="btn-action" onclick="deleteUpload(${r.id})" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ff6b81;">Failed to load data.</td></tr>';
            }
        }

        async function deleteUpload(id) {
            if (!confirm('Are you sure you want to delete this resource?')) return;
            try {
                const res = await fetch(`${API_BASE}/resource/api/resources/${id}/`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchUploads();
                } else {
                    alert('Delete failed.');
                }
            } catch(e) {
                console.error(e);
            }
        }

        fetchUploads();
    </script>
</body>
</html>
