<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Chat — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080818;
            --surface: #0e1525;
            --panel: #1a2332;
            --border: rgba(130,140,255,0.1);
            --accent-1: #818cf8;
            --accent-2: #c084fc;
            --accent-3: #f472b6;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #34d399;
            --faculty-bg: linear-gradient(135deg, #065f46, #047857);
            --student-bg: linear-gradient(135deg, #312e81, #4c1d95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Ambient BG */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: 
                radial-gradient(ellipse at 10% 20%, rgba(129,140,248,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(192,132,252,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244,114,182,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ─── Sidebar: Room List ─── */
        .sidebar {
            width: 340px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(129,140,248,0.06), transparent);
        }
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header h2 i {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-header p { font-size: 12px; color: var(--muted); margin-top: 4px; }

        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .room-list::-webkit-scrollbar { width: 4px; }
        .room-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .room-card {
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .room-card:hover {
            background: linear-gradient(135deg, rgba(129,140,248,0.06), rgba(192,132,252,0.04));
            border-color: rgba(129,140,248,0.1);
        }
        .room-card.active {
            background: linear-gradient(135deg, rgba(129,140,248,0.1), rgba(192,132,252,0.06));
            border-color: rgba(129,140,248,0.3);
            box-shadow: 0 0 20px rgba(129,140,248,0.08);
        }
        .room-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .room-card .room-code { font-size: 11px; color: var(--accent-2); font-weight: 500; }
        .room-card .room-preview { font-size: 12px; color: var(--muted); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .room-card .room-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .room-card .room-meta span { font-size: 10px; color: var(--muted); }
        .room-card .msg-count {
            padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
            background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(192,132,252,0.1));
            color: var(--accent-1);
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
        }
        .user-meta { flex: 1; }
        .user-meta h4 { font-size: 13px; }
        .user-meta p { font-size: 11px; color: var(--muted); text-transform: capitalize; }
        .back-btn {
            background: none; border: none; color: var(--muted); cursor: pointer;
            font-size: 16px; transition: color 0.2s;
        }
        .back-btn:hover { color: var(--accent-1); }

        /* ─── Chat Area (WhatsApp Style) ─── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0b141a;
        }

        .chat-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(14,21,37,0.95), rgba(26,35,50,0.95));
            display: flex; align-items: center; gap: 14px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }
        .chat-header-icon {
            width: 42px; height: 42px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
            box-shadow: 0 4px 12px rgba(129,140,248,0.3);
        }
        .chat-header-info { flex: 1; }
        .chat-header-info h3 { font-size: 16px; font-weight: 600; color: #e9edef; }
        .chat-header-info p { font-size: 12px; color: var(--accent-2); }

        .chat-header-actions { display: flex; gap: 8px; align-items: center; }
        .header-action-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.3s;
        }
        .header-action-btn:hover {
            background: rgba(129,140,248,0.1); color: var(--accent-1);
            border-color: rgba(129,140,248,0.2);
        }
        .header-action-btn.video-btn:hover {
            background: rgba(52,211,153,0.1); color: var(--success);
            border-color: rgba(52,211,153,0.25);
            box-shadow: 0 0 16px rgba(52,211,153,0.15);
        }

        .anon-badge {
            padding: 6px 12px; border-radius: 16px; font-size: 12px;
            background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(52,211,153,0.04));
            color: var(--success); border: 1px solid rgba(52,211,153,0.15);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 5%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .chat-empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #8696a0; text-align: center;
        }
        .chat-empty i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .chat-empty h3 { font-size: 18px; margin-bottom: 8px; }
        .chat-empty p { font-size: 13px; max-width: 320px; }

        /* Messages */
        .msg-row {
            display: flex;
            animation: fadeSlide 0.2s ease-out;
            margin-bottom: 8px;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-row.me { justify-content: flex-end; }

        .msg-bubble {
            max-width: 65%;
            padding: 6px 7px 8px 9px;
            border-radius: 8px;
            font-size: 14.2px;
            line-height: 19px;
            word-wrap: break-word;
            position: relative;
            color: #e9edef;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }
        .msg-row.me .msg-bubble {
            background: linear-gradient(135deg, #1e3a5f, #1a2e4a);
            border-top-right-radius: 0;
            border: 1px solid rgba(129,140,248,0.08);
        }
        .msg-row:not(.me) .msg-bubble {
            background: rgba(255,255,255,0.04);
            border-top-left-radius: 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-sender { 
            font-size: 12.5px; font-weight: 500; margin-bottom: 2px; line-height: 21px; 
        }
        .msg-row.faculty .msg-sender { color: var(--success); }
        .msg-row.student .msg-sender { color: var(--accent-2); }

        .msg-time { 
            font-size: 11px; color: rgba(255,255,255,0.6); 
            float: right; margin-top: 6px; margin-left: 12px;
            line-height: 15px;
        }

        /* Chat Input */
        .chat-input-area {
            padding: 12px 16px;
            background: linear-gradient(180deg, transparent, rgba(14,21,37,0.95));
            display: flex; gap: 12px; align-items: flex-end;
        }
        .chat-input-row {
            flex: 1;
            display: flex; gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            align-items: center;
            transition: all 0.3s;
        }
        .chat-input-row:focus-within {
            border-color: rgba(129,140,248,0.3);
            background: rgba(129,140,248,0.04);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.06);
        }
        .chat-input-row textarea {
            flex: 1; background: none; border: none; outline: none;
            color: #e9edef; resize: none; font-family: 'Inter', sans-serif;
            font-size: 15px; max-height: 100px; line-height: 20px;
        }
        .chat-input-row textarea::placeholder { color: rgba(255,255,255,0.3); }
        
        .chat-send-btn {
            width: 44px; height: 44px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(129,140,248,0.3);
        }
        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(129,140,248,0.5);
        }

        .chat-improve-btn {
            background: transparent; color: var(--muted); border: none;
            cursor: pointer; font-size: 16px; padding: 0 4px;
            transition: all 0.2s;
        }
        .chat-improve-btn:hover { color: var(--accent-2); }

        /* Video Call Modal */
        .video-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .video-modal {
            width: 90vw; height: 85vh;
            background: var(--surface); border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .video-header {
            padding: 16px 24px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(129,140,248,0.06), transparent);
        }
        .video-header h3 {
            font-size: 16px; display: flex; align-items: center; gap: 10px;
        }
        .video-header h3 i {
            color: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .video-close {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.2s;
        }
        .video-close:hover { background: rgba(239,68,68,0.2); }
        .video-frame { flex: 1; }
        .video-frame iframe { width: 100%; height: 100%; border: none; }

        .no-room-selected {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--muted);
            background: linear-gradient(135deg, rgba(129,140,248,0.03), rgba(192,132,252,0.02));
        }
        .no-room-selected i {
            font-size: 56px; margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0.4;
        }
        .no-room-selected h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
        .no-room-selected p { font-size: 13px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-comments"></i> Classroom Chat</h2>
            <p>Anonymous student discussions</p>
        </div>

        <div class="room-list" id="roomList">
            <div class="chat-empty" style="padding: 40px 20px;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading rooms...</p>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="user-avatar" id="footerAvatar">U</div>
            <div class="user-meta">
                <h4 id="footerName">Loading...</h4>
                <p id="footerRole">—</p>
            </div>
            <button class="back-btn" onclick="goBack()" title="Go Back"><i class="fas fa-arrow-left"></i></button>
        </div>
    </aside>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="no-room-selected">
            <i class="fas fa-comment-dots"></i>
            <h3>Select a chat room</h3>
            <p>Pick a subject from the sidebar to start chatting</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = 'login.html';
        }

        // Setup footer
        document.getElementById('footerName').textContent = user.username;
        document.getElementById('footerRole').textContent = user.role;
        document.getElementById('footerAvatar').textContent = user.username.charAt(0).toUpperCase();

        function goBack() {
            if (user.role === 'faculty' || user.role === 'admin') {
                window.location.href = 'teacher.html';
            } else {
                window.location.href = 'student.html';
            }
        }

        let activeRoomId = null;
        let pollInterval = null;

        function makeRequest(method, url, data = null) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open(method, url, true);
                xhr.setRequestHeader('Authorization', `Bearer ${token}`);
                if (data) {
                    xhr.setRequestHeader('Content-Type', 'application/json');
                }
                xhr.onload = function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const response = xhr.responseText ? JSON.parse(xhr.responseText) : {};
                            resolve({ status: xhr.status, data: response });
                        } catch (e) {
                            resolve({ status: xhr.status, data: xhr.responseText });
                        }
                    } else if (xhr.status === 401) {
                        resolve({ status: 401, data: null });
                    } else {
                        reject(new Error(`HTTP Error: ${xhr.status}`));
                    }
                };
                xhr.onerror = function() {
                    reject(new Error("Network Error"));
                };
                xhr.send(data ? JSON.stringify(data) : null);
            });
        }

        async function loadRooms() {
            try {
                const res = await makeRequest('GET', `${API_BASE}/Genai/api/anon-rooms/`);
                if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
                const rooms = res.data;

                const container = document.getElementById('roomList');
                if (!rooms || rooms.length === 0) {
                    container.innerHTML = `
                        <div class="chat-empty" style="padding: 40px 20px;">
                            <i class="fas fa-inbox"></i>
                            <h3>No rooms</h3>
                            <p>No subject chat rooms available for you yet.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = rooms.map(r => `
                    <div class="room-card ${r.id == activeRoomId ? 'active' : ''}" onclick="openRoom(${r.id}, '${r.subject_name}', '${r.subject_code}')">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div>
                                <h4>${r.subject_name}</h4>
                                <span class="room-code">${r.subject_code}</span>
                            </div>
                        </div>
                        <p class="room-preview">${r.last_message}</p>
                        <div class="room-meta">
                            <span>${r.last_time ? new Date(r.last_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '—'}</span>
                            <span class="msg-count">${r.message_count} msgs</span>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Failed to load rooms:', e);
            }
        }

        async function openRoom(roomId, subjectName, subjectCode) {
            activeRoomId = roomId;
            if (pollInterval) clearInterval(pollInterval);

            // Update active state in sidebar
            document.querySelectorAll('.room-card').forEach(c => c.classList.remove('active'));
            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active');
            }

            // Build chat UI
            document.getElementById('chatArea').innerHTML = `
                <div class="chat-header">
                    <div class="chat-header-icon">💬</div>
                    <div class="chat-header-info">
                        <h3>${subjectName}</h3>
                        <p>${subjectCode}</p>
                    </div>
                    <div class="chat-header-actions">
                        <button class="header-action-btn video-btn" onclick="startVideoCall('${subjectName}', '${subjectCode}')" title="Start Video Call">
                            <i class="fas fa-video"></i>
                        </button>
                    </div>
                    <div class="anon-badge">
                        <i class="fas fa-user-secret"></i>
                        ${user.role === 'student' ? 'You are anonymous' : 'Students are anonymous'}
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading messages...</p>
                    </div>
                </div>

                <form class="chat-input-area" onsubmit="event.preventDefault(); sendMessage(); return false;">
                    <div class="chat-input-row">
                        ${user.role === 'faculty' ? `<button type="button" class="chat-improve-btn" onclick="improveText()" title="Enhance text with AI"><i class="fas fa-magic"></i></button>` : ''}
                        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" style="flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Inter'; font-size:15px; padding:4px 0;">
                    </div>
                    <button type="submit" class="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            `;

            await loadMessages();
            // Poll every 5 seconds
            pollInterval = setInterval(loadMessages, 5000);
        }

        async function loadMessages() {
            if (!activeRoomId) return;
            try {
                const res = await makeRequest('GET', `${API_BASE}/Genai/api/anon-rooms/${activeRoomId}/messages/`);
                if (res.status === 401) return;
                const messages = res.data;

                const container = document.getElementById('chatMessages');
                if (!container) return;

                if (!messages || messages.length === 0) {
                    container.innerHTML = `
                        <div class="chat-empty">
                            <i class="fas fa-comment-slash"></i>
                            <h3>No messages yet</h3>
                            <p>Be the first to start the discussion!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = messages.map(m => {
                    const roleClass = m.is_faculty ? 'faculty' : 'student';
                    const meClass = m.is_me ? ' me' : '';
                    const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                    return `
                        <div class="msg-row ${roleClass}${meClass}">
                            <div class="msg-bubble">
                                ${!m.is_me ? `<div class="msg-sender">${m.sender_alias}</div>` : ''}
                                <span>${escapeHtml(m.content)}</span>
                                <span class="msg-time">${time}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                container.scrollTop = container.scrollHeight;
            } catch(e) {
                console.error('Failed to load messages:', e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const content = input.value.trim();
            if (!content || !activeRoomId) return;

            input.value = '';

            try {
                await makeRequest('POST', `${API_BASE}/Genai/api/anon-rooms/${activeRoomId}/messages/`, { content });
                await loadMessages();
            } catch(e) {
                console.error('Send failed:', e);
            }
        }

        async function improveText() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const content = input.value.trim();
            if (!content) return;

            const btn = document.querySelector('.chat-improve-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const prompt = "Improve the following message for clarity and professional tone. Output ONLY the improved text, nothing else:\\n\\n" + content;
                const res = await makeRequest('POST', `${API_BASE}/Genai/api/genai/`, { question: prompt });
                const data = res.data;
                let answer = data?.answer?.choices?.[0]?.message?.content || data?.answer;
                if (answer) {
                    input.value = answer.trim();
                }
            } catch(e) {
                console.error('Improve text failed:', e);
            }

            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─── Video Call (Jitsi Meet) ───
        function startVideoCall(subjectName, subjectCode) {
            const roomName = `EduHub-${subjectCode}-${activeRoomId}`;
            const displayName = user.role === 'student' ? 'Anonymous Student' : user.username;

            const overlay = document.createElement('div');
            overlay.className = 'video-overlay';
            overlay.id = 'videoOverlay';
            overlay.innerHTML = `
                <div class="video-modal">
                    <div class="video-header">
                        <h3><i class="fas fa-circle"></i> Live — ${subjectName}</h3>
                        <button class="video-close" onclick="endVideoCall()" title="End Call"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="video-frame">
                        <iframe
                            src="https://meet.jit.si/${encodeURIComponent(roomName)}#userInfo.displayName=%22${encodeURIComponent(displayName)}%22&config.prejoinPageEnabled=false"
                            allow="camera; microphone; fullscreen; display-capture; autoplay"
                        ></iframe>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function endVideoCall() {
            const overlay = document.getElementById('videoOverlay');
            if (overlay) overlay.remove();
        }

        // Init
        loadRooms();
    </script>
</body>
</html>
