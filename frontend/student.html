<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background: #0f0c29; color:#fff; }
        
        /* Navbar */
        nav {
            display:flex; justify-content:space-between; align-items:center;
            padding: 20px 40px; background: rgba(15,12,41,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); position: sticky; top:0; z-index:100;
        }
        .logo { font-size:24px; font-weight:800; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar { position: relative; width: 400px; }
        .search-bar input {
            width:100%; padding: 12px 20px 12px 48px; border-radius: 20px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color:#fff; font-family:'Inter'; outline:none; transition: all 0.3s;
        }
        .search-bar input:focus { border-color: #667eea; background: rgba(255,255,255,0.08); }
        .search-bar i { position: absolute; left:18px; top:14px; color:rgba(255,255,255,0.5); }
        
        .nav-right { display:flex; align-items:center; gap:24px; }
        .user-chip {
            display:flex; align-items:center; gap:10px;
            padding: 6px 16px 6px 6px; background: rgba(255,255,255,0.05);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
        .logout-btn { color:#ff6b81; cursor:pointer; background:none; border:none; font-size:18px; transition: transform 0.2s; }
        .logout-btn:hover { transform: scale(1.1); }

        /* Main Content */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .welcome-card {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            border: 1px solid rgba(102,126,234,0.2); border-radius: 24px;
            padding: 40px; margin-bottom: 40px; position:relative; overflow:hidden;
        }
        .welcome-card h1 { font-size:32px; margin-bottom:8px; }
        .welcome-card p { color:rgba(255,255,255,0.7); max-width:600px; }
        .sem-badge {
            position:absolute; top:40px; right:40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding:10px 20px; border-radius:20px; font-weight:600;
        }

        /* Tabs */
        .tabs { display:flex; gap:16px; margin-bottom:32px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:16px; }
        .tab {
            padding: 10px 24px; border-radius: 8px; cursor:pointer;
            color:rgba(255,255,255,0.6); font-weight:500; transition:all 0.3s;
        }
        .tab:hover { color:#fff; background:rgba(255,255,255,0.05); }
        .tab.active { color:#fff; background:rgba(102,126,234,0.15); color:#667eea; }

        /* Resource Grid */
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:24px; }
        .resource-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 24px; transition:all 0.3s;
            display:flex; flex-direction:column;
        }
        .resource-card:hover { transform: translateY(-5px); border-color: rgba(102,126,234,0.5); background: rgba(255,255,255,0.05); }
        
        .rc-header { display:flex; justify-content:space-between; margin-bottom:16px; }
        .file-icon { width:48px; height:48px; border-radius:12px; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; font-size:24px; color:#667eea; }
        
        .rc-title { font-size:18px; font-weight:600; margin-bottom:8px; line-height:1.4; }
        .rc-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:24px; flex:1; }
        
        .rc-meta { display:flex; gap:16px; font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:20px; }
        .rc-meta span { display:flex; align-items:center; gap:6px; }
        
        .btn-download {
            width:100%; padding:12px; border-radius:8px; border:none;
            background: rgba(102,126,234,0.1); color:#667eea; font-weight:600;
            cursor:pointer; transition:all 0.3s; display:flex; justify-content:center; align-items:center; gap:8px;
            text-decoration: none;
        }
        .btn-download:hover { background: linear-gradient(135deg, #667eea, #764ba2); color:#fff; }

        /* Floating Tunga Bot */
        .lumi-fab {
            position: fixed; bottom: 40px; right: 40px;
            height: 60px; border-radius: 30px; padding: 0 24px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            color: #fff; font-size: 18px; font-weight: 600; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(102,126,234,0.5);
            cursor: pointer; transition: all 0.3s; z-index: 1000;
        }
        .lumi-fab:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 35px rgba(102,126,234,0.7); }

        /* Loader */
        .loader { text-align:center; padding:40px; color:rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🎓 EduHub</div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search for notes, past papers...">
        </div>
        <div class="nav-right">
            <a href="notices.html" style="color:rgba(255,255,255,0.7); text-decoration:none;"><i class="fas fa-bell"></i> Notices</a>
            <div class="user-chip">
                <div class="avatar" id="userAvatar">S</div>
                <span id="userName" style="font-size:14px; font-weight:500;">Loading...</span>
            </div>
            <button class="logout-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <div class="sem-badge" id="semBadge">Semester -</div>
            <h1 id="greeting">Welcome back, Student</h1>
            <p>Here are the latest study materials uploaded by your professors for your current semester.</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="loadResources()">Latest Materials</div>
        </div>

        <div id="contentArea">
            <div class="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
        </div>
    </div>

    <!-- Floating General AI Button -->
    <a href="#" id="genAiBtn" class="genai-fab" style="position: fixed; bottom: 120px; right: 40px; height: 60px; border-radius: 30px; padding: 0 24px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 18px; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(17,153,142,0.5); z-index: 1000; transition: all 0.3s;">
        <i class="fas fa-brain"></i> Ask General AI
    </a>

    <!-- Floating Tunga Button -->
    <a href="#" id="lumiBtn" class="lumi-fab">
        <i class="fas fa-robot"></i> Ask Tunga (Notes)
    </a>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'student') {
            window.location.href = 'login.html';
        }

        // Setup User Info
        document.getElementById('userName').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
        document.getElementById('greeting').textContent = `Welcome back, ${user.username}`;
        document.getElementById('semBadge').textContent = `Semester ${user.sem || 'N/A'}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Tunga Bot redirection
        document.getElementById('lumiBtn').onclick = (e) => {
            e.preventDefault();
            window.location.href = `lumi.html?token=${token}`;
        };

        // General AI Bot redirection
        document.getElementById('genAiBtn').onclick = (e) => {
            e.preventDefault();
            window.location.href = `genai.html?token=${token}`;
        };

        function getFileIcon(type) {
            switch(type) {
                case 'PDF': return 'fa-file-pdf';
                case 'PPT': return 'fa-file-powerpoint';
                case 'DOC': return 'fa-file-word';
                case 'IMG': return 'fa-file-image';
                default: return 'fa-file-alt';
            }
        }

        async function recordDownload(id, url) {
            try {
                await fetch(`${API_BASE}/resource/api/student/resources/${id}/download/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                window.open(url, '_blank');
            } catch(e) {
                console.error(e);
                window.open(url, '_blank'); // fallback
            }
        }

        function renderCards(resources) {
            const container = document.getElementById('contentArea');
            if (resources.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:60px 0; color:rgba(255,255,255,0.4);">
                        <i class="fas fa-folder-open fa-3x" style="margin-bottom:16px;"></i>
                        <h2>No resources found</h2>
                        <p>Your professors haven't uploaded anything matching this yet.</p>
                    </div>`;
                return;
            }

            const html = resources.map(r => `
                <div class="resource-card">
                    <div class="rc-header">
                        <div class="file-icon"><i class="fas ${getFileIcon(r.file_type)}"></i></div>
                    </div>
                    <h3 class="rc-title">${r.title}</h3>
                    <p class="rc-sub">${r.subject ? r.subject.sub_name : 'No Subject'} • Prof. ${r.uploaded_by}</p>
                    <div class="rc-meta">
                        <span><i class="fas fa-clock"></i> ${new Date(r.created_at).toLocaleDateString()}</span>
                        <span><i class="fas fa-eye"></i> ${r.view_count} views</span>
                        <span><i class="fas fa-hdd"></i> ${r.file_size}</span>
                    </div>
                    ${r.file 
                        ? `<button class="btn-download" onclick="recordDownload(${r.id}, '${API_BASE}${r.file}')"><i class="fas fa-download"></i> Download</button>`
                        : `<a href="${r.reference_url}" target="_blank" class="btn-download"><i class="fas fa-external-link-alt"></i> External Link</a>`
                    }
                </div>
            `).join('');

            container.innerHTML = `<div class="grid">${html}</div>`;
        }

        async function loadResources(query = '') {
            const container = document.getElementById('contentArea');
            container.innerHTML = '<div class="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>';

            try {
                const url = query 
                    ? `${API_BASE}/resource/api/student/search/?q=${encodeURIComponent(query)}`
                    : `${API_BASE}/resource/api/student/dashboard/`;
                
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) return logout();
                
                const data = await res.json();
                // Dashboard returns an object { recent_resources: [] }, search returns array []
                const list = query ? data : data.recent_resources;
                renderCards(list);

            } catch(e) {
                console.error(e);
                container.innerHTML = '<p class="loader">Failed to load resources.</p>';
            }
        }

        // Search debounce
        let timeout = null;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                loadResources(e.target.value.trim());
            }, 500);
        });

        // Init
        loadResources();
    </script>
</body>
</html>
