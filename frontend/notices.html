<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background: #0f0c29; color:#fff; }
        
        /* Nav/Sidebar base styles mapping depending on role... */
        /* For simplicity, we'll build a unified layout that adapts to role */
        .navbar {
            display:flex; justify-content:space-between; align-items:center;
            padding: 20px 40px; background: rgba(15,12,41,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); position: sticky; top:0; z-index:100;
        }
        .logo { font-size:24px; font-weight:800; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-right { display:flex; align-items:center; gap:24px; }
        .user-chip { display:flex; align-items:center; gap:10px; padding: 6px 16px 6px 6px; background: rgba(255,255,255,0.05); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
        .logout-btn { color:#ff6b81; cursor:pointer; background:none; border:none; font-size:18px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .header h1 { font-size: 32px; font-weight: 700; }
        .btn-primary {
            padding: 12px 24px; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); border:none; color: #fff; font-weight: 600; cursor:pointer; display: flex; align-items:center; gap:8px;
        }

        .notices-list { display:flex; flex-direction:column; gap:20px; }
        .notice-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 24px; transition:all 0.3s; position:relative;
        }
        .notice-card:hover { border-color: rgba(102,126,234,0.3); background: rgba(255,255,255,0.05); }
        .nc-header { display:flex; justify-content:space-between; margin-bottom:12px; }
        .nc-title { font-size:18px; font-weight:600; color:#667eea; }
        .nc-meta { font-size:12px; color:rgba(255,255,255,0.4); display:flex; gap:16px; margin-bottom:16px; }
        .nc-content { color:rgba(255,255,255,0.8); line-height:1.6; font-size:15px; }
        
        .btn-dismiss {
            position:absolute; top:24px; right:24px; background:rgba(255,255,255,0.05);
            border:none; color:rgba(255,255,255,0.5); width:32px; height:32px; border-radius:50%;
            cursor:pointer; transition:all 0.2s; display:none;
        }
        .btn-dismiss:hover { background:rgba(255,71,87,0.1); color:#ff6b81; }

        .btn-delete {
            position:absolute; top:24px; right:24px; background:none;
            border:none; color:rgba(255,71,87,0.7); cursor:pointer; font-size:16px; display:none;
        }
        .btn-delete:hover { color:#ff6b81; }

        /* Modal */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display:none; align-items:center; justify-content:center; z-index:1000;
        }
        .modal {
            background: #1a1a2e; width:100%; max-width:500px;
            border-radius:20px; border:1px solid rgba(255,255,255,0.1); padding:32px;
        }
        .modal-header { display:flex; justify-content:space-between; margin-bottom:24px; }
        .close-btn { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:18px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:rgba(255,255,255,0.7); margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; padding:12px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-family:'Inter';
        }
        .form-group textarea { height:120px; resize:none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="javascript:goHome()" class="logo" style="text-decoration:none;">🎓 EduHub</a>
        <div class="nav-right">
            <div class="user-chip">
                <div class="avatar" id="userAvatar">U</div>
                <span id="userName" style="font-size:14px; font-weight:500;">Loading...</span>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div>
                <h1>College Notices</h1>
                <p style="color:rgba(255,255,255,0.5); margin-top:4px;" id="subHead">Latest official announcements.</p>
            </div>
            <button class="btn-primary" id="btnCreateNotice" style="display:none;" onclick="openModal()">
                <i class="fas fa-plus"></i> Post Notice
            </button>
        </div>

        <div class="notices-list" id="noticesList">
            <div style="text-align:center; padding:40px; color:rgba(255,255,255,0.5);">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            </div>
        </div>
    </div>

    <!-- Create Modal (Faculty Only) -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Post New Notice</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="noticeForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="notTitle" required placeholder="Important Announcement">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="notContent" required placeholder="Write the notice details here..."></textarea>
                </div>
                <div class="form-group">
                    <label>Target Semester</label>
                    <select id="notSem">
                        <option value="">All Semesters (General)</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:16px;">
                    Post Notice
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = 'login.html';

        document.getElementById('userName').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();

        const isFaculty = (user.role === 'faculty' || user.role === 'admin');
        if (isFaculty) {
            document.getElementById('btnCreateNotice').style.display = 'flex';
            document.getElementById('subHead').textContent = 'Manage notices you have posted.';
        }

        function goHome() {
            window.location.href = isFaculty ? 'teacher.html' : 'student.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function openModal() { document.getElementById('createModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('createModal').style.display = 'none'; document.getElementById('noticeForm').reset(); }

        async function fetchNotices() {
            const list = document.getElementById('noticesList');
            try {
                const res = await fetch(`${API_BASE}/notice/api/notices/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                const data = await res.json();

                if (data.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center; padding:60px; color:rgba(255,255,255,0.4); border:1px dashed rgba(255,255,255,0.1); border-radius:16px;">
                            <i class="fas fa-check-circle fa-3x" style="margin-bottom:16px; color:#2ed573;"></i>
                            <h3>All caught up!</h3>
                            <p style="margin-top:8px;">There are no new notices right now.</p>
                        </div>`;
                    return;
                }

                list.innerHTML = data.map(n => `
                    <div class="notice-card" id="notice-${n.id}">
                        <div class="nc-header">
                            <h3 class="nc-title"><i class="fas fa-bullhorn" style="margin-right:8px;"></i>${n.title}</h3>
                        </div>
                        <div class="nc-meta">
                            <span><i class="fas fa-user"></i> ${n.posted_by || 'Admin'}</span>
                            <span><i class="fas fa-clock"></i> ${new Date(n.created_at).toLocaleString()}</span>
                            ${n.semester ? `<span style="color:#f093fb;"><i class="fas fa-graduation-cap"></i> Sem ${n.semester}</span>` : '<span style="color:#f093fb;"><i class="fas fa-globe"></i> General</span>'}
                        </div>
                        <div class="nc-content">${(n.content || '').replace(/\n/g, '<br>')}</div>
                        
                        ${!isFaculty 
                            ? `<button class="btn-dismiss" style="display:block;" onclick="dismissNotice(${n.id})" title="Dismiss"><i class="fas fa-times"></i></button>`
                            : `<button class="btn-delete" style="display:block;" onclick="deleteNotice(${n.id})" title="Delete"><i class="fas fa-trash"></i></button>`
                        }
                    </div>
                `).join('');

            } catch(e) {
                console.error(e);
                list.innerHTML = '<p style="color:#ff6b81;">Failed to load notices.</p>';
            }
        }

        async function dismissNotice(id) {
            try {
                await fetch(`${API_BASE}/notice/api/notices/${id}/dismiss/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const el = document.getElementById(`notice-${id}`);
                el.style.opacity = '0';
                setTimeout(() => { el.remove(); if(document.querySelectorAll('.notice-card').length===0) fetchNotices(); }, 300);
            } catch(e) { console.error(e); }
        }

        async function deleteNotice(id) {
            if(!confirm('Delete this notice?')) return;
            try {
                await fetch(`${API_BASE}/notice/api/notices/${id}/`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchNotices();
            } catch(e) { console.error(e); }
        }

        document.getElementById('noticeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                title: document.getElementById('notTitle').value,
                content: document.getElementById('notContent').value,
                semester: document.getElementById('notSem').value || null
            };
            
            try {
                const res = await fetch(`${API_BASE}/notice/api/notices/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (res.ok) {
                    closeModal();
                    fetchNotices();
                } else { alert("Failed to post notice."); }
            } catch(e) { console.error(e); }
        });

        fetchNotices();
    </script>
</body>
</html>
