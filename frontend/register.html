<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color:#fff;
        }
        .register-container { width:100%; max-width:480px; padding:20px; }
        .register-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align:center; margin-bottom:28px; }
        .logo h1 {
            font-size:28px; font-weight:700;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .logo p { color:rgba(255,255,255,0.5); font-size:14px; margin-top:4px; }
        .form-row { display:flex; gap:12px; }
        .form-row .form-group { flex:1; }
        .form-group { margin-bottom:16px; }
        .form-group label {
            display:block; font-size:13px; font-weight:500;
            color:rgba(255,255,255,0.7); margin-bottom:5px;
        }
        .form-group input, .form-group select {
            width:100%; padding:12px 14px;
            background: rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; color:#fff; font-size:14px;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline:none; border-color:#667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.3); }
        .form-group select { cursor:pointer; }
        .form-group select option { background:#1a1a2e; color:#fff; }
        .btn-register {
            width:100%; padding:14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border:none; border-radius:12px;
            color:#fff; font-size:16px; font-weight:600;
            cursor:pointer; transition: all 0.3s;
            margin-top:4px;
        }
        .btn-register:hover { transform:translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
        .btn-register:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .error-msg {
            background: rgba(255,71,87,0.15);
            border:1px solid rgba(255,71,87,0.3);
            color:#ff6b81; padding:10px 14px;
            border-radius:10px; font-size:13px;
            margin-bottom:14px; display:none;
        }
        .success-msg {
            background: rgba(46,213,115,0.15);
            border:1px solid rgba(46,213,115,0.3);
            color:#2ed573; padding:10px 14px;
            border-radius:10px; font-size:13px;
            margin-bottom:14px; display:none;
        }
        .login-link {
            text-align:center; margin-top:20px;
            font-size:14px; color:rgba(255,255,255,0.5);
        }
        .login-link a { color:#667eea; text-decoration:none; font-weight:500; }
        .login-link a:hover { text-decoration:underline; }
        .sem-field { display:none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <h1>🎓 EduHub</h1>
                <p>Create your account</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Role</label>
                        <select id="role">
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mobile</label>
                        <input type="text" id="mobile" placeholder="Phone number">
                    </div>
                </div>

                <div class="form-row sem-field" id="studentFields">
                    <div class="form-group">
                        <label>USN</label>
                        <input type="text" id="usn" placeholder="University Seat Number">
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <select id="sem">
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">Create Account</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        

        // Toggle student fields
        document.getElementById('role').addEventListener('change', (e) => {
            document.getElementById('studentFields').style.display =
                e.target.value === 'student' ? 'flex' : 'none';
        });

        // Show student fields by default
        document.getElementById('studentFields').style.display = 'flex';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const role = document.getElementById('role').value;
            const body = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: role,
                mobile_number: document.getElementById('mobile').value || null,
            };

            if (role === 'student') {
                body.usn = document.getElementById('usn').value || null;
                body.sem = parseInt(document.getElementById('sem').value) || null;
            }

            try {
                const res = await fetch(`${API_BASE}/api/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    const errMsg = typeof data === 'object'
                        ? Object.values(data).flat().join(', ')
                        : data.error || 'Registration failed';
                    throw new Error(errMsg);
                }

                successMsg.textContent = 'Account created! Redirecting to login...';
                successMsg.style.display = 'block';

                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
