<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard — EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background: #0f0c29; color:#fff;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px; height: 100vh; position: fixed;
            background: rgba(15,12,41,0.9); border-right: 1px solid rgba(255,255,255,0.05);
            padding: 24px 0; display:flex; flex-direction:column;
            backdrop-filter: blur(20px);
        }
        .logo {
            font-size: 20px; font-weight: 700; padding: 0 24px 32px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-items { flex:1; }
        .nav-item {
            padding: 16px 24px; color: rgba(255,255,255,0.6);
            display: flex; align-items:center; gap: 12px;
            text-decoration:none; transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #fff; background: rgba(102,126,234,0.1);
            border-right: 3px solid #667eea;
        }
        .user-profile {
            padding: 24px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items:center; gap:12px;
        }
        .avatar {
            width:40px; height:40px; border-radius:50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex; align-items:center; justify-content:center;
            font-weight:600;
        }
        .user-info h4 { font-size:14px; }
        .user-info p { font-size:12px; color:rgba(255,255,255,0.5); }
        .logout-btn { color:#ff6b81; cursor:pointer; background:none; border:none; margin-left:auto; }

        /* Main Content */
        .main-content {
            margin-left: 250px; padding: 32px 48px;
        }
        .header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;
        }
        .header h1 { font-size: 28px; font-weight: 700; }
        .btn-upload {
            padding: 12px 24px; border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2); border:none;
            color: #fff; font-weight: 600; cursor:pointer;
            display: flex; align-items:center; gap:8px; transition: transform 0.3s;
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 24px; border-radius: 16px;
        }
        .stat-header { display:flex; justify-content:space-between; color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:16px; }
        .stat-val { font-size: 32px; font-weight: 700; }

        /* Sections */
        .sections-grid { display:grid; grid-template-columns: 2fr 1fr; gap:24px; }
        .section-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 24px; border-radius: 16px;
        }
        .section-header { display:flex; justify-content:space-between; margin-bottom:20px; }
        
        /* Lists */
        .list-item {
            display:flex; justify-content:space-between; align-items:center;
            padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .list-item:last-child { border-bottom:none; }
        .item-icon { width:40px; height:40px; border-radius:8px; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; }
        .item-info { flex:1; margin:0 16px; }
        .item-info h4 { font-size:15px; margin-bottom:4px; }
        .item-info p { font-size:13px; color:rgba(255,255,255,0.5); }
        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size:12px; font-weight:600;
        }
        .status-approved { background: rgba(46,213,115,0.1); color: #2ed573; }
        .status-pending { background: rgba(255,165,2,0.1); color: #ffa502; }

        /* Modal */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display:none; align-items:center; justify-content:center; z-index:1000;
        }
        .modal {
            background: #1a1a2e; width:100%; max-width:500px;
            border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            padding:32px;
        }
        .modal-header { display:flex; justify-content:space-between; margin-bottom:24px; }
        .close-btn { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:18px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:rgba(255,255,255,0.7); margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; padding:12px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1); border-radius:8px;
            color:#fff; font-family:'Inter';
        }
        .form-group textarea { height:80px; resize:none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎓 EduHub</div>
        <div class="nav-items">
            <a href="teacher.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="myuploads.html" class="nav-item"><i class="fas fa-folder"></i> My Uploads</a>
            <a href="notices.html" class="nav-item"><i class="fas fa-bullhorn"></i> Notices</a>
        </div>
        <div class="user-profile">
            <div class="avatar" id="userAvatar">T</div>
            <div class="user-info">
                <h4 id="userName">Loading...</h4>
                <p>Faculty</p>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1 id="greeting">Welcome back, Professor</h1>
                <p style="color:rgba(255,255,255,0.5); margin-top:4px;">Here's what's happening with your resources today.</p>
            </div>
            <button class="btn-upload" onclick="openModal()"><i class="fas fa-plus"></i> Upload Resource</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header"><span>Total Resources</span><i class="fas fa-file-alt"></i></div>
                <div class="stat-val" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span>Views Today</span><i class="fas fa-eye"></i></div>
                <div class="stat-val" id="statViews">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span>Pending Approvals</span><i class="fas fa-clock"></i></div>
                <div class="stat-val" id="statPending">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span>Active Students</span><i class="fas fa-users"></i></div>
                <div class="stat-val" id="statStudents">-</div>
            </div>
        </div>

        <div class="sections-grid">
            <div class="section-card">
                <div class="section-header">
                    <h3>Recent Uploads</h3>
                    <a href="myuploads.html" style="color:#667eea; text-decoration:none; font-size:14px;">View All</a>
                </div>
                <div id="recentUploadsContainer">
                    <p style="color:rgba(255,255,255,0.5); text-align:center; padding:20px;">Loading...</p>
                </div>
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <h3>Quick Actions</h3>
                </div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <button class="btn-upload" style="width:100%; justify-content:center;" onclick="openModal()">
                        <i class="fas fa-file-upload"></i> Upload Notes
                    </button>
                    <a href="notices.html" class="btn-upload" style="width:100%; justify-content:center; background:rgba(255,255,255,0.05); color:#fff; text-decoration:none;">
                        <i class="fas fa-bullhorn"></i> Post Notice
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Upload New Resource</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="resTitle" required placeholder="Lecture 1: Introduction">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="resDesc" placeholder="Brief notes about this upload..."></textarea>
                </div>
                <div class="form-group" style="display:flex; gap:12px;">
                    <div style="flex:1;">
                        <label>Subject</label>
                        <select id="resSubject" required>
                            <option value="">Loading subjects...</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label>File Type</label>
                        <select id="resType" required>
                            <option value="PDF">PDF Document</option>
                            <option value="PPT">Presentation</option>
                            <option value="DOC">Word Document</option>
                            <option value="IMG">Image</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>File</label>
                    <input type="file" id="resFile" required>
                </div>
                <button type="submit" class="btn-upload" style="width:100%; justify-content:center; margin-top:24px;" id="submitUploadBtn">
                    Upload & Publish
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || (user.role !== 'faculty' && user.role !== 'admin')) {
            window.location.href = 'login.html';
        }

        // Setup User Info
        document.getElementById('userName').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
        document.getElementById('greeting').textContent = `Welcome back, ${user.username}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function openModal() { document.getElementById('uploadModal').style.display = 'flex'; loadSubjects(); }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; document.getElementById('uploadForm').reset(); }

        async function fetchDashboardData() {
            try {
                const res = await fetch(`${API_BASE}/resource/api/faculty/dashboard/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                const data = await res.json();
                
                document.getElementById('statTotal').textContent = data.total_resources;
                document.getElementById('statViews').textContent = data.views_today;
                document.getElementById('statPending').textContent = data.pending_approvals;
                document.getElementById('statStudents').textContent = data.active_students;

                renderRecentUploads(data.recent_uploads);
            } catch(e) { console.error('Error fetching dashboard', e); }
        }

        function renderRecentUploads(uploads) {
            const container = document.getElementById('recentUploadsContainer');
            if (uploads.length === 0) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.5); text-align:center; padding:20px;">No uploads yet.</p>';
                return;
            }

            container.innerHTML = uploads.map(u => `
                <div class="list-item">
                    <div class="item-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="item-info">
                        <h4>${u.title}</h4>
                        <p>${u.subject} • ${new Date(u.created_at).toLocaleDateString()}</p>
                    </div>
                    <div class="status-badge status-${u.status.toLowerCase()}">${u.status}</div>
                </div>
            `).join('');
        }

        async function loadSubjects() {
            const select = document.getElementById('resSubject');
            if (select.options.length > 1) return; // already loaded
            try {
                const res = await fetch(`${API_BASE}/academic/api/subjects/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                // Show all subjects for now, or filter by logged in faculty
                const options = data.map(sub => `<option value="${sub.id}">${sub.sub_code} - ${sub.sub_name}</option>`);
                select.innerHTML = options.length ? options.join('') : '<option disabled>No subjects available</option>';
            } catch(e) { console.error(e); }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitUploadBtn');
            btn.disabled = true; btn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('title', document.getElementById('resTitle').value);
            formData.append('description', document.getElementById('resDesc').value);
            formData.append('subject', document.getElementById('resSubject').value);
            formData.append('file_type', document.getElementById('resType').value);
            formData.append('file', document.getElementById('resFile').files[0]);

            try {
                const res = await fetch(`${API_BASE}/resource/api/resources/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (res.ok) {
                    closeModal();
                    fetchDashboardData();
                    alert("Resource uploaded successfully!");
                } else {
                    alert("Failed to upload.");
                }
            } catch(e) {
                console.error(e);
                alert("Upload error.");
            } finally {
                btn.disabled = false; btn.innerHTML = 'Upload & Publish';
            }
        });

        // Init
        fetchDashboardData();
    </script>
</body>
</html>
